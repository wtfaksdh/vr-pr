services:
  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_NAME:-kanban}
      MYSQL_USER: ${DB_USER:-kanban_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-kanban_password}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-kanban_password}
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      # файлы из migrations/ выполняются автоматически один раз при первом запуске пустой БД
      - ./migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DB_HOST: db
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  db_data:
